app:
  timezone: "Asia/Seoul"
  week_start: "monday"
  include_page_images: true
  max_image_pages_per_pdf: 8
  send_mode: "draft"   # draft | send
  executive_email_subject: "[주간 글로벌 정세 동향] {range}"

paths:
  input_pdfs: "./input_pdfs"
  daily_json: "./daily_json"
  weekly_reports: "./weekly_reports"
  logs: "./logs"

llm:
  api_key: "YOUR_API_KEY"
  base_url: null
  model_text: "gpt-4.1-mini"
  model_vision: "gpt-4.1"
  temperature: 0.1
  max_output_tokens: 7000

outlook:
  to:
    - "executive1@company.com"
    - "executive2@company.com"
  cc: []
  importance: 2
  account: null

schedule:
  weekly_send_day: "friday"
  weekly_send_hour: 13
  weekly_send_minute: 0

prompt:
  system: |
    당신은 글로벌 정세 분석 전문가입니다.
    Eurasia Group의 Daily Brief 원문을 기반으로 주간 글로벌 정세 동향을 요약합니다.

    [수신 대상]
    - 임원진(C-Level)
    - 해당 동향을 바탕으로 담당 고객사(국내 50대 대기업)에 미치는 영향을 판단하는 데 활용

    [절대 규칙]
    - 입력된 PDF 원문에 명시적으로 기재된 내용만 사용할 것
    - AI가 사전 학습한 지식, 외부 정보, 추측, 의견을 절대 포함하지 말 것
    - 원문에 없는 수치·사실·인과관계를 임의로 생성하거나 추가하지 말 것
    - 확인되지 않는 내용은 쓰지 않는 것이 누락보다 낫다
    - 모든 bullet point에는 반드시 출처(PDF파일명 + 원문 문장 그대로 인용)를 표기할 것
    - 출처가 없는 bullet point는 작성하지 말 것

    [작성 규칙]
    1. 국가/지역 단위로 구분 (미국, 유럽, 중국, 일본, 인도, 러시아·우크라이나, 중동, 중남미, ASEAN 등)
    2. 각 국가/지역명 옆에 해당 주의 핵심을 한 줄로 간결하게 요약
    3. 하위 bullet에 세부 내용 작성
    4. 하나의 bullet이 여러 PDF에 걸친 내용일 경우, 각 PDF별로 원문 문장을 모두 인용
    5. 주요 키워드나 수치에 **BOLD** 표시 (정말 핵심적인 단어·수치에만)
    6. 일반인이 바로 이해하기 어려운 용어·사업명·기관명에는 *표시 후, 해당 bullet 바로 다음 줄에 이탤릭체로 한 줄 설명 추가
    7. 동일 이슈의 데이터가 변동된 경우 최신 수치 기준으로 작성하되 변동 추이를 함께 표기
    8. 중복 등장하는 내용은 최소화
    9. 전체 분량은 A4 1장 내외

  daily_user_template: |
    아래 PDF 1건을 읽고, 반드시 원문에 근거해 구조화 JSON만 출력하세요.

    목표:
    1) 이 문서의 핵심 이슈를 국가/지역 기준으로 정리
    2) 한국 대기업 관점에서 의미가 있을 수 있는 내용만 남김
    3) 각 bullet에 파일명과 원문 인용문을 남김
    4) 이후 주간 중복 제거를 위해 topic_key를 생성

    JSON 스키마:
    {
      "file_name": str,
      "file_date": "YYYY-MM-DD",
      "document_summary": str,
      "items": [
        {
          "region": str,
          "headline": str,
          "bullet": str,
          "topic_key": str,
          "topic_label": str,
          "impact_hint": str,
          "source_quotes": [
            {
              "file_name": str,
              "quote": str,
              "page": int | null
            }
          ]
        }
      ]
    }

    출력 규칙:
    - JSON 외 텍스트 금지
    - topic_key는 같은 주제를 주간 단계에서 묶을 수 있게 안정적으로 작성
    - 미국/일본 관련 내용이 있으면 region에 반드시 반영
    - source_quotes.quote는 원문 문장을 가능한 그대로 유지

  weekly_user_template: |
    아래는 한 주 동안의 Daily Brief 구조화 데이터입니다.
    같은 주제는 최신 날짜 문서를 우선 반영하고, 필요할 때만 변동 추이를 덧붙여 주간 보고서를 작성하세요.

    출력 형식:
    ## 주간 글로벌 정세 동향 (MM/DD~MM/DD)

    **국가/지역명**: 한 줄 요약
    - 세부 내용
      [출처: PDF파일명 | 원문: "원문 문장 그대로 인용"]

    규칙:
    - 반드시 제공된 JSON 데이터만 사용
    - 없는 내용 추론 금지
    - 중복 최소화
    - C-Level 보고용 한국어 문체 유지
    - A4 1장 내외
